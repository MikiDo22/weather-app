<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App </title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="head">
            <input type="text" class="cityName" spellcheck="false" placeholder="enter city name please" >
            <button class="searchBtn"><img src="./images/search.png" alt="search"></button>
        </div>
        <p class="error-message">Invalid City Name</p>     
        <div class="weather">
            <div class="details">
                <img src="./images/clouds.png" class="weather-icon" alt="">
                <div>
                    <p class="temp"> 22°C</p>
                    <h1 class="city">Görgeshausen</h1>
                </div>
            </div>
            <div class="details-weather">
                <div class="col">
                    <img src="/images/humidity.png" alt="">
                    <div class="left">
                        <p class="humidity">33%</p>
                        <p> Humidity </p>
                    </div>
                    
                </div>
                <div class="col">
                    <img src="/images/wind.png" alt="">
                    <div>
                        <p class="wind-speed">12km/h</p>
                        <p>wind speed </p>
                    </div>  
                </div>

            </div>
            
        </div>
    </div>
    
</body>
</html>
